version: '3.8'

# ═══════════════════════════════════════════════════════════════════════════════
# OverMind-MCP Docker Compose - PostgreSQL + pgvector Optimisé
# ═══════════════════════════════════════════════════════════════════════════════
# Configuration Docker parfaite pour OverMind-MCP
# Service: PostgreSQL + pgvector (Mémoire vectorielle 4096D)
#
# Prérequis:
#   - Docker Desktop installé et démarré
#   - Port 5432 disponible
#
# Usage:
#   docker-compose up -d
#
# Intégration OverMind:
#   - Base de données: overmind_memory
#   - Extension vectorielle: pgvector (4096D)
#   - Utilisateur: postgres
#   - Configuration optimisée pour embeddings
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ───────────────────────────────────────────────────────────────────────────────
  # POSTGRESQL + PGVECTOR (OverMind Memory Engine)
  # ───────────────────────────────────────────────────────────────────────────────
  # Base de données vectorielle optimisée pour OverMind
  # - Supporte les embeddings 4096D (Qwen, Claude, etc.)
  # - Performance optimale pour les recherches sémantiques
  # - Persistances des données et configurations OverMind
  postgres:
    image: pgvector/pgvector:pg16
    container_name: overmind-postgres-pgvector
    hostname: overmind-postgres

    ports:
      - "5432:5432"

    environment:
      # Configuration PostgreSQL
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: overmind_temp_password_change_me
      POSTGRES_DB: overmind_memory

      # Optimisations Performance
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
      POSTGRES_HOST_AUTH_METHOD: md5

      # Configuration Memory (optimisé pour vectors)
      POSTGRES_SHARED_BUFFERS: 256MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 1GB
      POSTGRES_MAINTENANCE_WORK_MEM: 64MB
      POSTGRES_WORK_MEM: 16MB

    volumes:
      # Data persistence
      - postgres_data:/var/lib/postgresql/data

      # Initialisation automatique OverMind
      - ./init-overmind-db.sql:/docker-entrypoint-initdb.d/01-init-overmind.sql:ro

    networks:
      - overmind-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d overmind_memory"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    restart: unless-stopped

    # Logging optimisé
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ─────────────────────────────────────────────────────────────────────────────────
# NETWORKS
# ─────────────────────────────────────────────────────────────────────────────────
networks:
  overmind-network:
    driver: bridge
    name: overmind-network
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ─────────────────────────────────────────────────────────────────────────────────
# VOLUMES
# ─────────────────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    name: overmind-postgres-data
    driver: local
