version: '3.8'

services:
  # ─── RABBITMQ EXPORTER ─────────────────────────────────────────────────────────────────────
  rabbitmq-exporter:
    image: kbudde/rabbitmq-exporter:v1.0.0-RC9
    container_name: overmind-rabbitmq-exporter
    ports:
      - "9090:9090"
    environment:
      RABBIT_URL: http://rabbitmq:15672
      RABBIT_USER: overmind
      RABBIT_PASSWORD: overmind_secret_password_change_me
      PUBLISH_PORT: 9090
      OUTPUT_FORMAT: JSON
    networks:
      - overmind-network
    depends_on:
      - rabbitmq
    restart: unless-stopped

  # ─── POSTGRES EXPORTER ──────────────────────────────────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: overmind-postgres-exporter
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres_password_change_me@postgres:5432/overmind_memory?sslmode=disable"
    networks:
      - overmind-network
    depends_on:
      - postgres
    restart: unless-stopped

  # ─── REDIS EXPORTER ─────────────────────────────────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    container_name: overmind-redis-exporter
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis:redis://redis:6379
    networks:
      - overmind-network
    depends_on:
      - redis
    restart: unless-stopped

networks:
  overmind-network:
    external: true
    name: overmind-network
